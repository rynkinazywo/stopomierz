name: Update FRA daily

on:
  schedule:
    - cron: '0 6 * * *'  # codziennie o 6:00 UTC
  workflow_dispatch:

jobs:
  update-fra:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install selenium

      - name: Install Chromium & ChromeDriver
        run: |
          sudo apt update
          sudo apt install -y chromium-browser chromium-chromedriver
          sudo ln -sf /usr/lib/chromium-browser/chromedriver /usr/bin/chromedriver

      - name: Run scraper
        run: python fra_scraper_debug.py

      - name: Commit and push fra.json
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add fra.json
          git commit -m "Auto update FRA" || echo "Brak zmian"
          git push

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v2   # ← ZAMIANA TUTAJ!
        with:
          name: fra-debug-screens
          path: debug_*.png
